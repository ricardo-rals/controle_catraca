name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  qualidade-e-testes:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cac_user
          POSTGRES_PASSWORD: cac_password
          POSTGRES_DB: cac_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: chave-de-teste-do-ci
      DEBUG: "True"
      DATABASE_URL: postgres://cac_user:cac_password@localhost:5432/cac_db

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements/dev.txt
      - run: ruff check .
      - run: black --check .
      - run: pytest