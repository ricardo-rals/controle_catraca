
repos:
  - repo: local
    hooks:
      - id: ruff-docker
        name: ruff (container)
        entry: docker compose exec -T web ruff check --fix .
        language: system
        types: [python]
        pass_filenames: false

      - id: black-docker
        name: black (container)
        entry: docker compose exec -T web black .
        language: system
        types: [python]
        pass_filenames: false